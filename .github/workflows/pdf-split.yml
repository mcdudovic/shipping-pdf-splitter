name: PDF Splitter

on:
  workflow_dispatch:

jobs:
  split-pdf:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install system dependencies for OCR
      run: |
        sudo apt-get update
        sudo apt-get install -y tesseract-ocr poppler-utils
        tesseract --version
        echo "OCR dependencies installed successfully"
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        echo "Python dependencies installed successfully"
    
    - name: List files in repository
      run: |
        echo "Files in repository:"
        ls -la
        echo "Looking for PDF files:"
        find . -name "*.pdf" -type f
    
    - name: Run PDF splitter
      run: |
        python pdf_splitter.py
    
    - name: List output files
      run: |
        echo "Output folder contents:"
        ls -la output/ || echo "No output folder found"
        find . -name "*.pdf" -type f
    
    - name: Upload split PDF files
      uses: actions/upload-artifact@v4
      with:
        name: split-pdf-files
        path: output/
        if-no-files-found: warn

name: PDF Splitter with Network Drive Upload

on:
  workflow_dispatch:

jobs:
  split-pdf:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install system dependencies for OCR
      run: |
        sudo apt-get update
        sudo apt-get install -y tesseract-ocr poppler-utils
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run PDF splitter with SharePoint copy
      run: |
        python pdf_splitter.py
    
    - name: Commit cleanup of processed files
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add -A
        if git diff --staged --quiet; then
          echo "No files to commit"
        else
          git commit -m "Auto-delete processed PDF files after SharePoint copy"
          git push
        fi
